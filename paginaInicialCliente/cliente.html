<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVANDERIA RADICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
       
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
       
        .card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
       
        .search-input {
            transition: all 0.2s ease;
        }
       
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
       
        .modal {
            animation: modalPop 0.3s ease forwards;
        }
       
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md mx-auto bg-zinc-900 rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
       
        <!-- HEADER -->
        <div class="flex justify-center pt-8 pb-6">
            <div class="bg-blue-600 text-white px-10 py-4 rounded-full text-2xl font-bold tracking-wider shadow-inner">
                LAVANDERIA RADICAL
            </div>
        </div>

        <!-- NAV -->
        <div class="px-6 flex items-center justify-between">
            <button onclick="fakeTabClick(this)"
                    class="bg-blue-500 hover:bg-blue-600 transition-colors px-8 py-3 rounded-full text-sm font-semibold shadow-md">
                seus pedidos
            </button>
           
            <button onclick="novoPedido()"
                    class="bg-emerald-500 hover:bg-emerald-600 transition-all px-8 py-3 rounded-full text-sm font-semibold shadow-md flex items-center gap-2">
                <span>novo pedido+</span>
            </button>
        </div>

        <!-- SEARCH + FILTER -->
        <div class="px-6 mt-8 flex gap-3">
            <!-- SEARCH BAR -->
            <div class="flex-1 relative">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 01-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input id="search-input"
                       type="text"
                       placeholder="Buscar por pedido ou data..."
                       onkeyup="filtrarPedidos()"
                       class="search-input w-full bg-zinc-800 border border-zinc-700 focus:border-blue-500 rounded-2xl pl-12 pr-6 py-4 text-base outline-none">
            </div>
           
            <!-- FILTRAR POR -->
            <button onclick="filtrarPorClick()"
                    class="bg-violet-600 hover:bg-violet-700 transition-colors px-7 py-4 rounded-2xl text-sm font-semibold whitespace-nowrap shadow-md">
                filtrar por
            </button>
        </div>

        <!-- PEDIDOS LIST -->
        <div id="pedidos-container" class="px-6 mt-8 pb-8 space-y-5 overflow-y-auto max-h-[420px]">
            <!-- Cards serão inseridos via JavaScript -->
        </div>
    </div>

    <!-- MODAL DETALHES -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 px-4">
        <div class="modal bg-zinc-900 rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-titulo" class="text-2xl font-bold text-white"></h2>
                <button onclick="fecharModal()"
                        class="w-10 h-10 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center justify-center text-xl">
                    ✕
                </button>
            </div>
           
            <div class="space-y-6">
                <div id="modal-conteudo" class="text-zinc-300"></div>
               
                <div class="flex gap-3">
                    <button onclick="fecharModal()"
                            class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-semibold">
                        FECHAR
                    </button>
                    <button onclick="confirmarRecebimento()"
                            class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold">
                        CONFIRMAR RECEBIMENTO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== DADOS INICIAIS (aleatórios) ====================
        let pedidos = [
            {
                id: "P001",
                titulo: "Camisetas e Shorts",
                subtitulo: "20/03/2026 • Em lavagem",
                cor: "blue",
                detalhes: {
                    pecas: "8 peças",
                    valor: "R$ 42,00",
                    endereco: "Rua das Flores, 123 - Centro",
                    status: "Em lavagem",
                    previsao: "22/03/2026"
                }
            },
            {
                id: "P002",
                titulo: "Jeans e Calças",
                subtitulo: "18/03/2026 • Pronto",
                cor: "blue",
                detalhes: {
                    pecas: "5 peças",
                    valor: "R$ 68,00",
                    endereco: "Av. Paulista, 456 - Bela Vista",
                    status: "Pronto",
                    previsao: "Entregue hoje"
                }
            },
            {
                id: "P003",
                titulo: "Lençóis e Toalhas",
                subtitulo: "15/03/2026 • Lavando",
                cor: "blue",
                detalhes: {
                    pecas: "12 peças",
                    valor: "R$ 55,00",
                    endereco: "Rua Augusta, 789",
                    status: "Lavando",
                    previsao: "21/03/2026"
                }
            },
            {
                id: "P004",
                titulo: "Vestidos e Blusas",
                subtitulo: "12/03/2026 • Entregue",
                cor: "blue",
                detalhes: {
                    pecas: "6 peças",
                    valor: "R$ 89,00",
                    endereco: "Rua Oscar Freire, 1010",
                    status: "Entregue",
                    previsao: "Entregue em 16/03"
                }
            }
        ];

        // ==================== RENDERIZAR PEDIDOS ====================
        function renderizarPedidos(pedidosFiltrados) {
            const container = document.getElementById('pedidos-container');
            container.innerHTML = '';

            pedidosFiltrados.forEach(pedido => {
                const cardHTML = `
                    <div class="card bg-zinc-800 rounded-3xl p-6 flex items-center gap-5 shadow-xl border border-zinc-700">
                        <!-- CÍRCULO AZUL -->
                        <div class="w-16 h-16 bg-blue-500 rounded-2xl flex-shrink-0 shadow-inner"></div>
                       
                        <!-- INFORMAÇÕES -->
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-xl text-white truncate">${pedido.titulo}</p>
                            <p class="text-zinc-400 text-base mt-1">${pedido.subtitulo}</p>
                        </div>
                       
                        <!-- BOTÃO OLHO -->
                        <button onclick="verDetalhes('${pedido.id}')"
                                class="w-12 h-12 bg-emerald-500 hover:bg-emerald-600 transition-colors rounded-2xl flex items-center justify-center shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5 16.477 5 20.268 7.943 21.542 12 20.268 16.057 16.477 19 12 19 7.523 19 3.732 16.057 2.458 12z" />
                            </svg>
                        </button>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            // Se não houver resultados
            if (pedidosFiltrados.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-zinc-400">
                        <p class="text-6xl mb-4">🔍</p>
                        <p class="text-lg">Nenhum pedido encontrado</p>
                    </div>
                `;
            }
        }

        // ==================== FILTRAR PEDIDOS (busca em tempo real) ====================
        function filtrarPedidos() {
            const termo = document.getElementById('search-input').value.toLowerCase().trim();
           
            const filtrados = pedidos.filter(p =>
                p.titulo.toLowerCase().includes(termo) ||
                p.subtitulo.toLowerCase().includes(termo)
            );
           
            renderizarPedidos(filtrados);
        }

        // ==================== NOVO PEDIDO (dados aleatórios) ====================
        function novoPedido() {
            const titulosAleatorios = [
                "Saias e Blusas", "Toalhas de Banho", "Moletons e Casacos",
                "Roupas de Cama", "Tênis e Meias", "Uniformes Escolares"
            ];
            const statusAleatorios = [
                "Em lavagem", "Pronto", "Lavando", "Entregue"
            ];
            const datasAleatorias = ["21/03/2026", "22/03/2026", "23/03/2026", "24/03/2026"];
           
            const novo = {
                id: "P" + String(Math.floor(Math.random() * 900) + 100),
                titulo: titulosAleatorios[Math.floor(Math.random() * titulosAleatorios.length)],
                subtitulo: datasAleatorias[Math.floor(Math.random() * datasAleatorias.length)] + " • " + statusAleatorios[Math.floor(Math.random() * statusAleatorios.length)],
                cor: "blue",
                detalhes: {
                    pecas: Math.floor(Math.random() * 15) + 3 + " peças",
                    valor: "R$ " + (Math.floor(Math.random() * 120) + 25) + ",00",
                    endereco: "Rua Exemplo, " + Math.floor(Math.random() * 999) + " - Bairro",
                    status: statusAleatorios[Math.floor(Math.random() * statusAleatorios.length)],
                    previsao: "Entrega em 3 dias"
                }
            };
           
            pedidos.unshift(novo); // adiciona no topo
            renderizarPedidos(pedidos);
           
            // Feedback visual
            const notificacao = document.createElement('div');
            notificacao.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-8 py-3 rounded-2xl shadow-2xl flex items-center gap-3 text-sm font-medium';
            notificacao.innerHTML = `✅ Novo pedido #${novo.id} criado!`;
            document.body.appendChild(notificacao);
           
            setTimeout(() => {
                notificacao.style.transition = 'all 0.4s';
                notificacao.style.opacity = '0';
                setTimeout(() => notificacao.remove(), 400);
            }, 2500);
        }

        // ==================== VER DETALHES (MODAL) ====================
        function verDetalhes(id) {
            const pedido = pedidos.find(p => p.id === id);
            if (!pedido) return;
           
            document.getElementById('modal-titulo').textContent = `Pedido ${pedido.id}`;
           
            const conteudo = `
                <div class="bg-zinc-800 rounded-2xl p-6 space-y-5">
                    <div class="flex justify-between items-center">
                        <span class="text-zinc-400">Status</span>
                        <span class="px-5 py-1 bg-emerald-400 text-emerald-950 text-xs font-bold rounded-full">${pedido.detalhes.status}</span>
                    </div>
                   
                    <div class="grid grid-cols-2 gap-6 text-sm">
                        <div>
                            <p class="text-zinc-400">Peças</p>
                            <p class="text-2xl font-semibold text-white">${pedido.detalhes.pecas}</p>
                        </div>
                        <div>
                            <p class="text-zinc-400">Valor total</p>
                            <p class="text-2xl font-semibold text-white">${pedido.detalhes.valor}</p>
                        </div>
                    </div>
                   
                    <div>
                        <p class="text-zinc-400 text-sm">Endereço de entrega</p>
                        <p class="text-white mt-1">${pedido.detalhes.endereco}</p>
                    </div>
                   
                    <div>
                        <p class="text-zinc-400 text-sm">Previsão</p>
                        <p class="text-white mt-1">${pedido.detalhes.previsao}</p>
                    </div>
                </div>
            `;
           
            document.getElementById('modal-conteudo').innerHTML = conteudo;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function fecharModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function confirmarRecebimento() {
            alert("✅ Pedido marcado como recebido! Obrigado por usar a Lavanderia Radical.");
            fecharModal();
        }

        // ==================== BOTÃO FILTRAR POR (demo) ====================
        function filtrarPorClick() {
            const opcoes = ["Data mais recente", "Valor mais alto", "Status: Pronto", "Status: Em lavagem"];
            const escolha = opcoes[Math.floor(Math.random() * opcoes.length)];
           
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 right-6 bg-violet-600 text-white px-6 py-3 rounded-2xl shadow-xl text-sm';
            toast.textContent = `Filtro aplicado: ${escolha}`;
            document.body.appendChild(toast);
           
            setTimeout(() => {
                toast.style.transition = 'opacity 0.5s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 2200);
        }

        // ==================== CLICK FALSO NO "seus pedidos" ====================
        function fakeTabClick(btn) {
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);
        }

        // ==================== INICIALIZAÇÃO ====================
        function inicializar() {
            // Tailwind script já carregado
            renderizarPedidos(pedidos);
           
            // Fecha modal ao clicar fora
            const modal = document.getElementById('modal');
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    fecharModal();
                }
            });
           
            console.log('%c✅ Página LAVANDERIA RADICAL carregada com sucesso!', 'color:#22c55e; font-weight:bold');
        }

        // Inicia tudo
        window.onload = inicializar;
    </script>
</body>
</html>
