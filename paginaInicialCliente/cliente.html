<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAVANDERIA RADICAL</title>
  <link rel="stylesheet" href="cliente.css">
  <script src="cliente.js"></script>
</head>
<body class="body">

  <div class="container">
    
    <!-- HEADER -->
    <div class="header">
      <div class="logo">
        LAVANDERIA RADICAL
      </div>
    </div>

    <!-- BOTÕES PRINCIPAIS -->
    <div class="main-buttons">
      <button onclick="fakeTabClick(this)" class="btn btn-blue">
        SEUS PEDIDOS
      </button>
      
      <button onclick="novoPedido()" class="btn btn-emerald">
        NOVO PEDIDO +
      </button>
    </div>

    <!-- BUSCA E FILTRO -->
    <div class="search-area">
      <input 
        id="search-input"
        type="text" 
        placeholder="Buscar por pedido ou data..."
        onkeyup="filtrarPedidos()"
        class="search-input">
      
      <button onclick="filtrarPorClick()" class="btn btn-violet">
        FILTRAR POR
      </button>
    </div>

    <!-- Modal (exemplo) -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <button onclick="fecharModal()" class="modal-close">
          ✕
        </button>
        
        <div class="modal-buttons">
          <button onclick="fecharModal()" class="btn btn-zinc">
            FECHAR
          </button>
          <button onclick="confirmarRecebimento()" class="btn btn-emerald">
            CONFIRMAR RECEBIMENTO
          </button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
